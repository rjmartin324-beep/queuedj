version: "3.9"

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  # Persistent store: tracks/ISRC fingerprints, sessions, RLHF signals,
  # style profiles, licensing audit logs
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-queuedj}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-queuedj_dev}
      POSTGRES_DB: ${POSTGRES_DB:-queuedj}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/api/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-queuedj}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────────
  # Dual purpose:
  #   1. Socket.io Redis Adapter (room event pub/sub across server instances)
  #   2. BullMQ job queues (Node.js → Python ML pipeline)
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Node services run locally (tsx watch) — see scripts/dev.sh ────────────
  # Run: npm run dev:services  (starts api + realtime locally with tsx)
  # Docker only manages infra (postgres + redis) to avoid monorepo path issues
  # with multi-package builds inside a container context.

volumes:
  postgres_data:
  redis_data:
