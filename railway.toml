[project]
name = "queuedj"

# ─── Web (Expo) Service ───────────────────────────────────────────────────────
[[services]]
name = "queuedj"
source = "."

[services.build]
dockerfilePath = "Dockerfile.web"

[services.deploy]
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[[services.variables]]
name = "PORT"
value = "3000"

# ─── API Service ──────────────────────────────────────────────────────────────
[[services]]
name = "api"
source = "services/api"

[services.build]
dockerfilePath = "Dockerfile"

[services.deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[[services.variables]]
name = "PORT"
value = "3001"

# ─── Realtime Service ─────────────────────────────────────────────────────────
[[services]]
name = "realtime"
source = "services/realtime"

[services.build]
dockerfilePath = "Dockerfile"

[services.deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[[services.variables]]
name = "PORT"
value = "3002"

# ─── ML Service ───────────────────────────────────────────────────────────────
[[services]]
name = "ml"
source = "services/ml"

[services.build]
dockerfilePath = "Dockerfile"

[services.deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[[services.variables]]
name = "PORT"
value = "8000"
